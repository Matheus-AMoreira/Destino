server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /app/public;

    # Essencial para upload de imagens
    client_max_body_size 20M;

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=()";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Otimização de Assets (Vite/React)
    # Arquivos com hash (JS, CSS, Imagens) podem ser cacheados "para sempre"
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # 'app' é o nome do serviço no seu docker-compose
        fastcgi_pass destino_laravel:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.ht {
        deny all;
    }
}
