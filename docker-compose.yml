services:
  app:
    image: php:8.5.4-fpm
    container_name: php-laravel
    restart: unless-stopped
    working_dir: /var/www
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www:Z
      - ./docker/custom-php.ini:/usr/local/etc/php/conf.d/custom.ini:Z
    networks:
      - sistema-network

  nginx:
    image: nginx:alpine
    container_name: nginx-laravel
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - .:/var/www:Z
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:Z
    networks:
      - sistema-network

networks:
  sistema-network:
    driver: bridge
