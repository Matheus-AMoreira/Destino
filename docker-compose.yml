services:
  laravel:
    build:
      context: .
      target: runtime_php
    command: php-fpm
    container_name: destino_laravel
    env_file: .env.docker
    volumes:
      - ./public/build:/app/public/build 

  node:
    build:
      context: .
      target: runtime_node
    container_name: destino_node
    working_dir: /app
    depends_on:
      - laravel

  nginx:
    image: nginx:alpine
    ports:
      - '8000:80'
    volumes:
        - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        - ./public:/app/public
